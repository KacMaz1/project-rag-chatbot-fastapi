<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>RAG Chatbot</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <h1>RAG Chatbot</h1>

        <div id="chat-box"></div>

        <form id="chat-form">
            <input
                id="message-input"
                type="text"
                placeholder="Wpisz wiadomość..."
                autocomplete="off"
            >

            <button type="submit">Wyślij</button>
        </form>
    </main>

    <script src="script.js"></script>
</body>
</html>
